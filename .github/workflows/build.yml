name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for gh release create

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive package version
        id: pkg
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag v1.2.3 → pkgver 1.2.3-r0  (Alpine/apk convention)
            echo "ver=${GITHUB_REF_NAME#v}-r0" >> "$GITHUB_OUTPUT"
          else
            # Non-tagged builds get a dev label with the short commit SHA
            echo "ver=0.0.0-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        env:
          PKG_VER: ${{ steps.pkg.outputs.ver }}
        run: sh build-apk.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-speedtest-${{ steps.pkg.outputs.ver }}
          path: '*.apk'
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "luci-app-speedtest $GITHUB_REF_NAME" \
            --generate-notes \
            *.apk
